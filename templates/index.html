<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Age & Gender Detector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
    min-height:100vh;
}
.glass{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.3);
}
video,canvas{
    width:100%;
    border-radius:15px;
}
#canvas{display:none;}
#loading{display:none;}
</style>
</head>
<body>
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="glass text-center">
<h2 class="mb-4">🤖 AI Age & Gender Detector</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="mt-4">
<button class="btn btn-primary btn-lg" id="scanBtn">📸 Scan Face</button>
</div>

<div id="loading" class="mt-3">
<div class="spinner-border text-light"></div>
<p class="mt-2">Scanning...</p>
</div>

<div class="mt-4">
<h4>Gender</h4>
<p id="gender">-</p>

<h4>Age</h4>
<p id="age">-</p>

<h4>Compliment</h4>
<p id="compliment">You're awesome! 😊</p>
</div>
</div>
</div>
</div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const scanBtn=document.getElementById("scanBtn");
const loading=document.getElementById("loading");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream)
.catch(err=>alert("Unable to access camera: "+err));

scanBtn.onclick=async()=>{
loading.style.display="block";

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

const blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg"));

const formData=new FormData();
formData.append("image",blob,"capture.jpg");

const response=await fetch("/predict",{
method:"POST",
body:formData
});

const data=await response.json();
loading.style.display="none";

if(data.error){
alert(data.error);
return;
}

document.getElementById("gender").innerText=data.gender;
document.getElementById("age").innerText=data.age;
document.getElementById("compliment").innerText=data.compliment;
};
</script>
</body>
</html>
